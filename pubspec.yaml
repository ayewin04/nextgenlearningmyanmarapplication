name: polyglot_app
description: "Polyglot Exam App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0 
  flutter_svg: ^2.2.0
  lottie: ^3.3.2

  flutter_local_notifications: ^17.0.0
  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  http: ^1.1.0
  
  flutter_edge_tts: ^0.0.2
  

  # State Management
  provider: ^6.1.5

 # Audio - ✅ ADD THESE
  # ✅ CORRECT AUDIO PLAYER VERSION
  audioplayers: ^5.2.1
  record: ^5.0.4
  

  # Local Storage
  shared_preferences: ^2.5.3
  hive: ^2.2.3



  # Utilities
  intl: ^0.20.2
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/audio/
    - .env